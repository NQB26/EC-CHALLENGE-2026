<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<!-- Tối ưu viewport để cấm zoom trên điện thoại -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ESP32 BLE Gamepad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0c0f;
    --panel: #0f1318;
    --border: #1e2a35;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --green: #39ff14;
    --yellow: #ffaa00;
    --dim: #2a3a45;
    --text: #8ba8b8;
    --glow: 0 0 12px #00e5ff88;
    --glow2: 0 0 12px #ff3d7188;
    --glow-green: 0 0 12px #39ff1488;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    overscroll-behavior: none;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ─── Header ─────────────────────────────────────────── */
  header {
    width:100%; max-width:960px;
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem; font-weight:900;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 3px;
  }
  .logo span { color: var(--accent2); }

  /* ─── Connect button ─────────────────────────────────── */
  #connectBtn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 2px;
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  #connectBtn:hover { background: var(--accent); color: var(--bg); box-shadow: var(--glow); }
  #connectBtn.connected { border-color: var(--green); color: var(--green); }
  #connectBtn.connected:hover { background: var(--green); color: var(--bg); }

  /* ─── Status bar ─────────────────────────────────────── */
  .statusbar {
    width:100%; max-width:960px;
    display:flex; gap:14px; align-items:center;
    padding: 5px 20px;
    font-size: 0.65rem; letter-spacing:1px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .dot {
    width:7px; height:7px; border-radius:50%;
    background: var(--dim); flex-shrink:0;
    transition: background .3s;
  }
  .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .ctrl-status {
    margin-left: auto;
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: var(--dim);
    transition: color .3s;
  }
  .ctrl-status.active { color: var(--green); text-shadow: var(--glow-green); }

  /* ─── Main layout ────────────────────────────────────── */
  main {
    width:100%; max-width:960px;
    padding: 10px 14px;
    display:flex; flex-direction:column; gap:10px;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Gamepad shell ──────────────────────────────────── */
  .gamepad {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 16px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
    position: relative;
    flex-shrink: 0;
  }
  .gamepad::before {
    content:'';
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:120px; height:3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity:0.6;
  }

  /* ─── D-Pad ──────────────────────────────────────────── */
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(3, 52px);
    gap: 4px;
    justify-self: center;
  }
  .dpad-btn {
    background: #0d1520;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    color: var(--dim);
    font-size: 16px;
    user-select:none;
    transition: all .1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .dpad-btn:empty { background:transparent; border-color:transparent; cursor:default; }
  .dpad-btn.active, .dpad-btn:active {
    background: var(--accent);
    color: var(--bg);
    box-shadow: var(--glow);
    border-color: var(--accent);
  }
  #btn-up    { grid-column:2; grid-row:1; }
  #btn-left  { grid-column:1; grid-row:2; }
  #btn-center{ grid-column:2; grid-row:2; background:#0d1520; cursor:default; }
  #btn-right { grid-column:3; grid-row:2; }
  #btn-down  { grid-column:2; grid-row:3; }

  /* ─── Center panel ───────────────────────────────────── */
  .center-panel {
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .mini-logo {
    font-family:'Orbitron',sans-serif; font-size:0.55rem;
    color:var(--dim); letter-spacing:3px;
  }

  /* ─── START / SELECT buttons ─────────────────────────── */
  .system-btns {
    display: flex; gap: 8px;
  }
  .sys-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem; letter-spacing: 1.5px;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    border-radius: 3px;
    transition: all .2s;
    text-transform: uppercase;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  #btn-select:active,
  #btn-select.active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
    background: rgba(0,229,255,0.08);
  }
  #btn-start {
    border-color: var(--yellow);
    color: var(--yellow);
  }
  #btn-start:active,
  #btn-start.ctrl-on {
    background: var(--yellow);
    color: var(--bg);
    box-shadow: 0 0 12px #ffaa0088;
  }
  #btn-start.ctrl-on {
    animation: pulse-start 1.5s infinite;
  }
  @keyframes pulse-start {
    0%,100% { box-shadow: 0 0 8px #ffaa0088; }
    50% { box-shadow: 0 0 20px #ffaa00cc; }
  }

  /* ─── ABXY Buttons ───────────────────────────────────── */
  .abxy {
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(3, 52px);
    gap: 4px;
    justify-self: center;
  }
  .abxy-btn {
    border-radius: 50%;
    border: 1px solid var(--border);
    background: #0d1520;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem; font-weight:700;
    color: var(--dim);
    display:flex; align-items:center; justify-content:center;
    user-select:none;
    transition: all .1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #btn-y { grid-column:2; grid-row:1; }
  #btn-x { grid-column:1; grid-row:2; }
  #btn-b { grid-column:3; grid-row:2; }
  #btn-a { grid-column:2; grid-row:3; }

  #btn-a.active, #btn-a:active { background:#39ff14; color:#000; box-shadow: 0 0 12px #39ff1488; border-color:#39ff14; }
  #btn-b.active, #btn-b:active { background:#ff3d71; color:#fff; box-shadow: var(--glow2); border-color:#ff3d71; }
  #btn-x.active, #btn-x:active { background:#4488ff; color:#fff; box-shadow: 0 0 12px #4488ff88; border-color:#4488ff; }
  #btn-y.active, #btn-y:active { background:#ffaa00; color:#000; box-shadow: 0 0 12px #ffaa0088; border-color:#ffaa00; }

  /* ─── Log / Serial panel ─────────────────────────────── */
  .log-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    min-height: 0;
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .log-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem; letter-spacing: 2px;
    color: var(--accent); text-transform: uppercase;
  }
  .log-actions {
    display: flex; gap: 8px;
  }
  .log-clear-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem; letter-spacing: 1px;
    padding: 2px 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    border-radius: 2px;
    transition: all .2s;
  }
  .log-clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .log-count {
    font-size: 0.55rem; color: var(--dim);
    letter-spacing: 1px;
  }
  .log {
    flex: 1;
    padding: 8px 12px;
    font-size: 0.65rem;
    overflow-y: auto;
    color: var(--text);
    scroll-behavior: smooth;
  }
  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-track { background: var(--panel); }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .log .line { padding: 2px 0; border-bottom: 1px solid rgba(30,42,53,0.5); display: flex; gap: 6px; }
  .log .line.btn-line { color: var(--accent); }
  .log .line.ctrl-start { color: var(--green); }
  .log .line.ctrl-stop  { color: var(--accent2); }
  .log .line.serial-line { color: #b0e0ff; }
  .log .ts { color: var(--dim); flex-shrink: 0; font-size: 0.6rem; }
  .log .msg { word-break: break-all; }

  /* ─── Portrait Mobile ────────────────────────────────── */
  @media (max-width: 600px) {
    main { padding: 8px 10px; gap: 8px; }
    .gamepad {
      padding: 12px 10px;
      gap: 12px 8px;
    }
    .dpad {
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
    }
    .abxy {
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
    }
    .sys-btn { padding: 5px 8px; font-size: 0.45rem; }
  }

  /* ─── Landscape Mobile ───────────────────────────────── */
  @media (max-height: 500px) and (orientation: landscape) {
    body { overflow: hidden; }
    header { padding: 5px 16px; }
    .logo { font-size: 0.75rem; }
    .statusbar { padding: 3px 16px; }
    main {
      padding: 6px 14px;
      gap: 6px;
      flex-direction: row;
      align-items: stretch;
    }
    .gamepad {
      padding: 10px 10px;
      gap: 10px;
      flex-shrink: 0;
    }
    .dpad {
      grid-template-columns: repeat(3, 42px);
      grid-template-rows: repeat(3, 42px);
      gap: 3px;
    }
    .abxy {
      grid-template-columns: repeat(3, 42px);
      grid-template-rows: repeat(3, 42px);
      gap: 3px;
    }
    .system-btns { gap: 6px; }
    .sys-btn { padding: 5px 8px; font-size: 0.45rem; }
    .log-container {
      flex: 1;
      min-height: 0;
    }
    .log { font-size: 0.6rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">ESP32<span>·</span>CTRL</div>
  <button id="connectBtn">[ CONNECT BLE ]</button>
</header>

<div class="statusbar">
  <div class="dot" id="statusDot"></div>
  <span id="statusText">DISCONNECTED</span>
  <span class="ctrl-status" id="ctrlStatus">● STANDBY</span>
</div>

<main>
  <div class="gamepad">
    <!-- D-Pad -->
    <div class="dpad">
      <div></div>
      <div class="dpad-btn" id="btn-up" data-btn="UP">▲</div>
      <div></div>
      <div class="dpad-btn" id="btn-left" data-btn="LEFT">◀</div>
      <div class="dpad-btn" id="btn-center"></div>
      <div class="dpad-btn" id="btn-right" data-btn="RIGHT">▶</div>
      <div></div>
      <div class="dpad-btn" id="btn-down" data-btn="DOWN">▼</div>
      <div></div>
    </div>

    <!-- Center: START / SELECT -->
    <div class="center-panel">
      <div class="mini-logo">EC·2026</div>
      <div class="system-btns">
        <button class="sys-btn" id="btn-select">SELECT</button>
        <button class="sys-btn" id="btn-start">START</button>
      </div>
    </div>

    <!-- ABXY -->
    <div class="abxy">
      <div></div>
      <div class="abxy-btn" id="btn-y" data-btn="Y">Y</div>
      <div></div>
      <div class="abxy-btn" id="btn-x" data-btn="X">X</div>
      <div></div>
      <div class="abxy-btn" id="btn-b" data-btn="B">B</div>
      <div></div>
      <div class="abxy-btn" id="btn-a" data-btn="A">A</div>
      <div></div>
    </div>
  </div>

  <!-- Serial Log -->
  <div class="log-container">
    <div class="log-header">
      <span class="log-title">▸ SERIAL OUTPUT</span>
      <div class="log-actions">
        <span class="log-count" id="logCount">0 lines</span>
        <button class="log-clear-btn" id="clearLogBtn">CLEAR</button>
      </div>
    </div>
    <div class="log" id="log"></div>
  </div>
</main>

<script>
// ── BLE UUIDs ──────────────────────────────────────────────────────────────────
const SVC  = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const CMD  = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

// ── State ──────────────────────────────────────────────────────────────────────
const BTN    = { UP:0x01, DOWN:0x02, LEFT:0x04, RIGHT:0x08, A:0x10, B:0x20, X:0x40, Y:0x80 };
const FLAG   = { START:0x01, SELECT:0x02 };
let buttons  = 0;
let flags    = 0;   // byte[2]: bit0=START, bit1=SELECT
let bleChar  = null;
let sendTimer = null;
let controlling = false;  // trạng thái điều khiển
let logLineCount = 0;

// ── Log ────────────────────────────────────────────────────────────────────────
const logEl    = document.getElementById('log');
const logCount = document.getElementById('logCount');

function log(msg, cls='') {
  const ts = new Date().toTimeString().slice(0,8);
  const line = document.createElement('div');
  line.className = 'line' + (cls ? ' ' + cls : '');
  line.innerHTML = `<span class="ts">[${ts}]</span><span class="msg">${msg}</span>`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  logLineCount++;
  logCount.textContent = logLineCount + ' lines';
}

document.getElementById('clearLogBtn').addEventListener('click', () => {
  logEl.innerHTML = '';
  logLineCount = 0;
  logCount.textContent = '0 lines';
});

// ── BLE ────────────────────────────────────────────────────────────────────────
document.getElementById('connectBtn').addEventListener('click', async () => {
  try {
    log('Scanning for BLE devices...');
    const dev = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SVC] }]
    });
    dev.addEventListener('gattserverdisconnected', onDisconnect);
    const server = await dev.gatt.connect();
    const svc    = await server.getPrimaryService(SVC);
    bleChar      = await svc.getCharacteristic(CMD);
    setConnected(true);
    log(`Connected: ${dev.name}`, 'btn-line');
    startSending();
  } catch(e) {
    log(`Error: ${e.message}`);
  }
});

function onDisconnect() {
  setConnected(false);
  bleChar = null;
  stopSending();
  if (controlling) stopControlling();
  log('Disconnected', 'ctrl-stop');
}

function setConnected(v) {
  const btn = document.getElementById('connectBtn');
  const dot = document.getElementById('statusDot');
  document.getElementById('statusText').textContent = v ? 'CONNECTED' : 'DISCONNECTED';
  btn.textContent = v ? '[ DISCONNECT ]' : '[ CONNECT BLE ]';
  btn.className = v ? 'connected' : '';
  dot.className = 'dot' + (v ? ' on' : '');
}

// ── Send packet ────────────────────────────────────────────────────────────────
// Packet layout (8 bytes):
//  [0] 0xAA  header
//  [1] buttons  (UP|DOWN|LEFT|RIGHT|A|B|X|Y)
//  [2] flags    (bit0=START, bit1=SELECT)
//  [3-6] reserved (0)
//  [7] XOR checksum
function buildPacket() {
  const pkt = new Uint8Array(8);
  pkt[0] = 0xAA;
  pkt[1] = buttons;
  pkt[2] = flags;
  pkt[3] = 0;
  pkt[4] = 0;
  pkt[5] = 0;
  pkt[6] = 0;
  let cs = 0; for(let i=0;i<7;i++) cs ^= pkt[i];
  pkt[7] = cs;
  return pkt;
}

async function sendPacket() {
  if (!bleChar) return;
  try { await bleChar.writeValueWithoutResponse(buildPacket()); }
  catch(e) { log(`Send error: ${e.message}`); }
}

function startSending() { sendTimer = setInterval(sendPacket, 50); }
function stopSending()  { clearInterval(sendTimer); }

// ── START / STOP controlling ───────────────────────────────────────────────────
function startControlling() {
  controlling = true;
  flags |= FLAG.START;   // set START bit in packet
  document.getElementById('btn-start').classList.add('ctrl-on');
  const cs = document.getElementById('ctrlStatus');
  cs.textContent = '● CONTROLLING';
  cs.classList.add('active');
  log('▶ Bắt đầu điều khiển', 'ctrl-start');
}

function stopControlling() {
  controlling = false;
  flags &= ~FLAG.START;  // clear START bit
  document.getElementById('btn-start').classList.remove('ctrl-on');
  const cs = document.getElementById('ctrlStatus');
  cs.textContent = '● STANDBY';
  cs.classList.remove('active');
  log('■ Kết thúc điều khiển', 'ctrl-stop');
}

// ── START button toggle ────────────────────────────────────────────────────────
const startBtn = document.getElementById('btn-start');

function handleStart(e) {
  e.preventDefault();
  if (controlling) {
    stopControlling();
  } else {
    startControlling();
  }
}
startBtn.addEventListener('mousedown', handleStart);
startBtn.addEventListener('touchstart', handleStart, {passive:false});

// ── SELECT button ──────────────────────────────────────────────────────────────
const selectBtn = document.getElementById('btn-select');

function handleSelectDown(e) {
  e.preventDefault();
  flags |= FLAG.SELECT;   // set SELECT bit
  selectBtn.classList.add('active');
  log('BTN SELECT pressed', 'btn-line');
}
function handleSelectUp(e) {
  e.preventDefault();
  flags &= ~FLAG.SELECT;  // clear SELECT bit
  selectBtn.classList.remove('active');
}
selectBtn.addEventListener('mousedown',  handleSelectDown);
selectBtn.addEventListener('mouseup',    handleSelectUp);
selectBtn.addEventListener('mouseleave', handleSelectUp);
selectBtn.addEventListener('touchstart', handleSelectDown, {passive:false});
selectBtn.addEventListener('touchend',   handleSelectUp,   {passive:false});

// ── D-Pad / ABXY Button press / release ───────────────────────────────────────
function press(mask, name) {
  if (buttons & mask) return;
  buttons |= mask;
  log(`BTN ${name} pressed`, 'btn-line');
}
function release(mask) { buttons &= ~mask; }

document.querySelectorAll('[data-btn]').forEach(el => {
  const name = el.dataset.btn;
  const mask = BTN[name];
  const onDown = e => { e.preventDefault(); el.classList.add('active'); press(mask, name); };
  const onUp   = e => { e.preventDefault(); el.classList.remove('active'); release(mask); };
  el.addEventListener('mousedown',  onDown);
  el.addEventListener('mouseup',    onUp);
  el.addEventListener('mouseleave', onUp);
  el.addEventListener('touchstart', onDown, {passive:false});
  el.addEventListener('touchend',   onUp,   {passive:false});
});

log('Ready — tap [ CONNECT BLE ] to start', 'serial-line');
</script>
</body>
</html>
